name: Test Cloudfront distribution availability
on:
  push:
    branches:
      - distribution
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1

jobs:
  setup:
    uses: ./.github/workflows/setup.yml
    with:
      terraform-dir: infrastructure

  test-cloudfront:
    runs-on: ubuntu-latest
    needs: setup
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:

      # GET CLOUDFRONT ALIASES FROM TERRAFORM
      - name: Get CloudFront aliases from Terraform output
        id: get_aliases
        run: |
          ALIASES=$(terraform output -json cloudfront_aliases | jq -r '.[]')
          echo "aliases<<EOF" >> $GITHUB_OUTPUT
          echo "$ALIASES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Cloudfront aliases detected:"
          echo "$ALIASES"

      # CHECK HTTPS AVAILABILITY FOR EACH ALIAS
      - name: Test HTTPS access for each alias
        run: |
          echo "Testing Cloudfront HTTPS responses..."
          FAIL=0
          
          while IFS= read -r DOMAIN; do
            echo "Testing htttps://$DOMAIN ..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://$DOMAIN")
            
            if [ "$RESPONSE" != "200" ]; then
              echo "$DOMAIN returned HTTP $RESPONSE (expected 200)"
              FAIL=1
            else
              echo "$DOMAIN is accessible over HTTPS (HTTP 200)"
            fi
          done <<< "${{ steps.get_aliases.outputs.aliases }}"
          
          if [ $FAIL -ne 0 ]; then
            echo "Some Cloudfront aliases failes the HTTPS test."
            exit 1
          fi
          
          echo "All Cloudfront aliases are healthy and reachable via HTTPS."
          
    
